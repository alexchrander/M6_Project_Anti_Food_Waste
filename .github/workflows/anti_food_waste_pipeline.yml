    # - cron: "45 14 * * *"
    # # 17:00-17:45 Danish (15:00 UTC)
    # - cron: "0 15 * * *"
    # - cron: "15 15 * * *"
    # - cron: "30 15 * * *"
    # - cron: "45 15 * * *"
    # # 18:00-18:45 Danish (16:00 UTC)
    # - cron: "0 16 * * *"
    # - cron: "15 16 * * *"
    # - cron: "30 16 * * *"
    # - cron: "45 16 * * *"
    # # 19:00-19:45 Danish (17:00 UTC)
    # - cron: "0 17 * * *"
    # - cron: "15 17 * * *"
    # - cron: "30 17 * * *"
    # - cron: "45 17 * * *"
    # # 20:00-20:45 Danish (18:00 UTC)
    # - cron: "0 18 * * *"
    # - cron: "15 18 * * *"
    # - cron: "30 18 * * *"
    # - cron: "45 18 * * *"
    # # 21:00-21:45 Danish (19:00 UTC)

name: Anti Food Waste Pipeline

on:
  workflow_dispatch: # Allow manual trigger from GitHub UI
  # schedule:
    # # Runs every 15 minutes between 06:00-00:00 Danish summer time (CEST = UTC+2)
    # # GitHub Actions cron runs in UTC, so we subtract 2 hours from Danish time
    # # Danish 06:00 = UTC 04:00, Danish 00:00 = UTC 22:00
    # #
    # # Format: minute hour * * * (runs every day)
    # # Each hour needs 4 entries for :00, :15, :30, :45

    # # 06:00-06:45 Danish (04:00 UTC)
    # - cron: "0 4 * * *"
    # - cron: "15 4 * * *"
    # - cron: "30 4 * * *"
    # - cron: "45 4 * * *"
    # # 07:00-07:45 Danish (05:00 UTC)
    # - cron: "0 5 * * *"
    # - cron: "15 5 * * *"
    # - cron: "30 5 * * *"
    # - cron: "45 5 * * *"
    # # 08:00-08:45 Danish (06:00 UTC)
    # - cron: "0 6 * * *"
    # - cron: "15 6 * * *"
    # - cron: "30 6 * * *"
    # - cron: "45 6 * * *"
    # # 09:00-09:45 Danish (07:00 UTC)
    # - cron: "0 7 * * *"
    # - cron: "15 7 * * *"
    # - cron: "30 7 * * *"
    # - cron: "45 7 * * *"
    # # 10:00-10:45 Danish (08:00 UTC)
    # - cron: "0 8 * * *"
    # - cron: "15 8 * * *"
    # - cron: "30 8 * * *"
    # - cron: "45 8 * * *"
    # # 11:00-11:45 Danish (09:00 UTC)

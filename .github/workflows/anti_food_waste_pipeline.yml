    # - cron: "15 9 * * *"
    # - cron: "30 9 * * *"
    # - cron: "45 9 * * *"
    # # 12:00-12:45 Danish (10:00 UTC)
    # - cron: "0 10 * * *"
    # - cron: "15 10 * * *"
    # - cron: "30 10 * * *"
    # - cron: "45 10 * * *"
    # # 13:00-13:45 Danish (11:00 UTC)
    # - cron: "0 11 * * *"
    # - cron: "15 11 * * *"
    # - cron: "30 11 * * *"
    # - cron: "45 11 * * *"
    # # 14:00-14:45 Danish (12:00 UTC)
    # - cron: "0 12 * * *"
    # - cron: "15 12 * * *"
    # - cron: "30 12 * * *"
    # - cron: "45 12 * * *"
    # # 15:00-15:45 Danish (13:00 UTC)
    # - cron: "0 13 * * *"
    # - cron: "15 13 * * *"
    # - cron: "30 13 * * *"
    # - cron: "45 13 * * *"
    # # 16:00-16:45 Danish (14:00 UTC)
    # - cron: "0 14 * * *"
